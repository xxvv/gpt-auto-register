<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GPT Auto Register Mini</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 10px; width: 360px; color: #222; }
    .steps { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 12px; }
    .step { min-height: 32px; padding: 6px 4px; text-align: center; background: #f0f0f0; font-size: 12px; display: flex; align-items: center; justify-content: center; }
    .step.active { background: #4caf50; color: white; }
    .panel { margin-bottom: 10px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    select, textarea, input { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 8px; }
    textarea { resize: vertical; }
    button { width: 100%; padding: 10px; font-size: 14px; background: #2196f3; color: white; border: none; cursor: pointer; margin-bottom: 8px; }
    button:hover { background: #1976d2; }
    button.secondary { background: #607d8b; }
    button.secondary:hover { background: #455a64; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .actions button { margin-bottom: 0; }
    .actions .wide { grid-column: 1 / -1; }
    .settings { border: 1px solid #ddd; padding: 8px; background: #fafafa; margin-top: 8px; }
    .settings-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
    .settings-field span { display: block; font-size: 12px; margin-bottom: 3px; font-weight: bold; }
    .settings-field input { margin-bottom: 4px; }
    .checkbox-option { display: flex; align-items: center; gap: 8px; margin: -2px 0 8px; font-weight: normal; }
    .checkbox-option input { width: auto; margin: 0; }
    .checkbox-option span { line-height: 1.3; }
    .hint { color: #666; font-size: 12px; line-height: 1.35; margin: 0 0 8px; }
    #logOutput { height: 210px; overflow-y: auto; border: 1px solid #ccc; padding: 8px; background: #fafafa; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
    .log-line { margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="steps">
    <div id="step1" class="step active">1. 注册</div>
    <div id="step2" class="step">2. PayURL</div>
    <div id="step3" class="step">3. PP支付</div>
    <div id="step4" class="step">4. PayPal</div>
    <div id="step5" class="step">5. 短信</div>
  </div>

  <div class="panel">
    <label for="country">获取支付链接的国家</label>
    <select id="country">
      <option value="JP">日本 (JP)</option>
      <option value="US">美国 (US)</option>
      <option value="ID">印度尼西亚 (ID)</option>
      <option value="DE">德国 (DE)</option>
    </select>
  </div>

  <div class="panel">
    <label for="payUrlInput">PayURL</label>
    <input id="payUrlInput" type="url" spellcheck="false" placeholder="https://...">
    <div class="actions">
      <button id="startPayUrlBtn" class="secondary" type="button">从 PayURL 开始支付</button>
      <button id="startStep3Btn" class="secondary" type="button">从第3步开始</button>
      <button id="fillStep5FormBtn" class="secondary wide" type="button">填充第5步表单</button>
    </div>
  </div>

  <div class="panel">
    <label for="phoneKeyInput">手机区域</label>
    <textarea
      id="phoneKeyInput"
      rows="4"
      spellcheck="false"
      placeholder="+14484490908|http://a.62-us.com/api/get_sms?key=...&#10;+14484490909|http://a.62-us.com/api/get_sms?key=..."
    ></textarea>
  </div>

  <div class="panel">
    <label for="cardInput">卡片信息</label>
    <textarea id="cardInput" rows="6" spellcheck="false" placeholder="card----year/month----cvv----url----name----address,city state postcode,US"></textarea>
    <label class="checkbox-option" for="randomCardCheckbox">
      <input id="randomCardCheckbox" type="checkbox">
      <span>随机生成卡片</span>
    </label>
    <div class="actions">
      <button id="toggleFillSettingsButton" class="secondary" type="button" aria-expanded="false">设置</button>
      <button id="resetFillSettingsButton" class="secondary" type="button">恢复默认</button>
    </div>
    <section id="fillSettingsPanel" class="settings" hidden>
      <p class="hint">默认按页面字段 ID 填充，手机号优先取上面的手机区域，并自动去掉 +1。</p>
      <div class="settings-grid">
        <label class="settings-field"><span>手机号</span><input id="phoneSelectorInput" type="text" spellcheck="false"><input id="phoneSelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>卡号</span><input id="cardNumberSelectorInput" type="text" spellcheck="false"><input id="cardNumberSelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>过期时间</span><input id="cardExpirySelectorInput" type="text" spellcheck="false"><input id="cardExpirySelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>CVV</span><input id="cardCvvSelectorInput" type="text" spellcheck="false"><input id="cardCvvSelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>Billing Name</span><input id="billingNameSelectorInput" type="text" spellcheck="false"><input id="billingNameSelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>First Name</span><input id="firstNameSelectorInput" type="text" spellcheck="false"><input id="firstNameSelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>Last Name</span><input id="lastNameSelectorInput" type="text" spellcheck="false"><input id="lastNameSelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>Address</span><input id="billingLine1SelectorInput" type="text" spellcheck="false"><input id="billingLine1SelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>City</span><input id="billingCitySelectorInput" type="text" spellcheck="false"><input id="billingCitySelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>State</span><input id="billingStateSelectorInput" type="text" spellcheck="false"><input id="billingStateSelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>Postcode</span><input id="billingPostalCodeSelectorInput" type="text" spellcheck="false"><input id="billingPostalCodeSelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>Country</span><input id="countrySelectorInput" type="text" spellcheck="false"><input id="countrySelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>密码字段</span><input id="passwordSelectorInput" type="text" spellcheck="false"><input id="passwordSelectorAltInput" type="text" spellcheck="false" placeholder="备用选择器"></label>
        <label class="settings-field"><span>默认密码</span><input id="passwordValueInput" type="text" spellcheck="false"></label>
      </div>
    </section>
  </div>

  <div class="panel">
    <label for="runCountInput">执行次数</label>
    <input id="runCountInput" type="number" min="1" step="1" value="1">
  </div>

  <button id="startBtn" type="button">开始完整流程</button>

  <div style="margin-top: 15px;">
    <label>日志输出</label>
    <div id="logOutput"></div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
